<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0d1320"/>
  <g stroke="#1c2333" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <rect x="32" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="50" y="58" fill="#5b6678" font-family="monospace" font-size="13">TOTAL LOAN APPS</text>
  <text x="50" y="86" fill="#e6e9f0" font-family="monospace" font-size="26" font-weight="700">38.6K</text>

  <rect x="218" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="236" y="58" fill="#5b6678" font-family="monospace" font-size="13">FUNDED AMOUNT</text>
  <text x="236" y="86" fill="#22d3ee" font-family="monospace" font-size="26" font-weight="700">$435M</text>

  <rect x="404" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="422" y="58" fill="#5b6678" font-family="monospace" font-size="13">GOOD LOAN %</text>
  <text x="422" y="86" fill="#e6e9f0" font-family="monospace" font-size="26" font-weight="700">86.2%</text>

  <rect x="590" y="28" width="178" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="608" y="58" fill="#5b6678" font-family="monospace" font-size="13">DEFAULT RATE</text>
  <text x="608" y="86" fill="#a78bfa" font-family="monospace" font-size="26" font-weight="700">13.8%</text>

  <!-- Line chart panel -->
  <rect x="32" y="120" width="500" height="300" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="52" y="150" fill="#8b97ad" font-family="monospace" font-size="14">MONTHLY LOAN FUNDING TREND</text>
  <polyline points="60,360 130,330 200,340 270,290 340,260 410,230 480,180 520,170"
            fill="none" stroke="#22d3ee" stroke-width="3"/>
  <polyline points="60,360 130,330 200,340 270,290 340,260 410,230 480,180 520,170 520,400 60,400"
            fill="#22d3ee" opacity="0.08" stroke="none"/>
  <g fill="#a78bfa">
    <circle cx="130" cy="330" r="4"/>
    <circle cx="270" cy="290" r="4"/>
    <circle cx="410" cy="230" r="4"/>
    <circle cx="520" cy="170" r="4"/>
  </g>

  <!-- Gauge panel -->
  <rect x="548" y="120" width="220" height="300" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="568" y="150" fill="#8b97ad" font-family="monospace" font-size="14">DTI RATIO</text>
  <g transform="translate(658,300)">
    <path d="M -80 0 A 80 80 0 0 1 80 0" fill="none" stroke="#1c2333" stroke-width="18"/>
    <path d="M -80 0 A 80 80 0 0 1 20 -78" fill="none" stroke="#22d3ee" stroke-width="18"/>
    <text x="0" y="-10" fill="#e6e9f0" font-family="monospace" font-size="22" text-anchor="middle" font-weight="700">13.3%</text>
  </g>
</svg>
