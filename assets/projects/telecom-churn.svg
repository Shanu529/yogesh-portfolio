<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0d1320"/>
  <!-- subtle grid -->
  <g stroke="#1c2333" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <!-- Top KPI cards -->
  <g>
    <rect x="32" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
    <text x="50" y="58" fill="#5b6678" font-family="monospace" font-size="13">CHURN RATE</text>
    <text x="50" y="86" fill="#22d3ee" font-family="monospace" font-size="26" font-weight="700">26.5%</text>

    <rect x="218" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
    <text x="236" y="58" fill="#5b6678" font-family="monospace" font-size="13">TOTAL CUSTOMERS</text>
    <text x="236" y="86" fill="#e6e9f0" font-family="monospace" font-size="26" font-weight="700">7,043</text>

    <rect x="404" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
    <text x="422" y="58" fill="#5b6678" font-family="monospace" font-size="13">AVG. TENURE</text>
    <text x="422" y="86" fill="#e6e9f0" font-family="monospace" font-size="26" font-weight="700">32 mo</text>

    <rect x="590" y="28" width="178" height="74" rx="8" fill="#111827" stroke="#232c40"/>
    <text x="608" y="58" fill="#5b6678" font-family="monospace" font-size="13">MONTHLY REVENUE</text>
    <text x="608" y="86" fill="#a78bfa" font-family="monospace" font-size="26" font-weight="700">$456K</text>
  </g>

  <!-- Bar chart panel -->
  <rect x="32" y="120" width="430" height="300" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="52" y="150" fill="#8b97ad" font-family="monospace" font-size="14">CHURN BY CONTRACT TYPE</text>
  <g fill="#22d3ee">
    <rect x="70" y="320" width="60" height="70" rx="3"/>
    <rect x="170" y="240" width="60" height="150" rx="3" fill="#a78bfa"/>
    <rect x="270" y="350" width="60" height="40" rx="3"/>
    <rect x="370" y="200" width="60" height="190" rx="3" fill="#a78bfa"/>
  </g>
  <g fill="#5b6678" font-family="monospace" font-size="12">
    <text x="80" y="408">M2M</text>
    <text x="172" y="408">1-YR</text>
    <text x="272" y="408">2-YR</text>
    <text x="372" y="408">FIBER</text>
  </g>

  <!-- Donut chart panel -->
  <rect x="478" y="120" width="290" height="300" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="498" y="150" fill="#8b97ad" font-family="monospace" font-size="14">PAYMENT METHOD MIX</text>
  <g transform="translate(623,290)">
    <circle r="80" fill="none" stroke="#1c2333" stroke-width="26"/>
    <circle r="80" fill="none" stroke="#22d3ee" stroke-width="26" stroke-dasharray="220 502" stroke-dashoffset="0"/>
    <circle r="80" fill="none" stroke="#a78bfa" stroke-width="26" stroke-dasharray="150 502" stroke-dashoffset="-220"/>
    <circle r="80" fill="none" stroke="#3b4660" stroke-width="26" stroke-dasharray="132 502" stroke-dashoffset="-370"/>
    <text x="0" y="6" fill="#e6e9f0" font-family="monospace" font-size="22" text-anchor="middle" font-weight="700">7,043</text>
  </g>
</svg>
