<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0d1320"/>
  <g stroke="#1c2333" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <rect x="32" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="50" y="58" fill="#5b6678" font-family="monospace" font-size="13">PATIENTS</text>
  <text x="50" y="86" fill="#e6e9f0" font-family="monospace" font-size="26" font-weight="700">5,110</text>

  <rect x="218" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="236" y="58" fill="#5b6678" font-family="monospace" font-size="13">HIGH RISK</text>
  <text x="236" y="86" fill="#a78bfa" font-family="monospace" font-size="26" font-weight="700">812</text>

  <rect x="404" y="28" width="170" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="422" y="58" fill="#5b6678" font-family="monospace" font-size="13">AVG. BMI</text>
  <text x="422" y="86" fill="#e6e9f0" font-family="monospace" font-size="26" font-weight="700">28.9</text>

  <rect x="590" y="28" width="178" height="74" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="608" y="58" fill="#5b6678" font-family="monospace" font-size="13">STROKE RATE</text>
  <text x="608" y="86" fill="#22d3ee" font-family="monospace" font-size="26" font-weight="700">4.8%</text>

  <!-- Scatter plot panel -->
  <rect x="32" y="120" width="450" height="300" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="52" y="150" fill="#8b97ad" font-family="monospace" font-size="14">RISK SCORE vs. AGE</text>
  <g fill="#22d3ee" opacity="0.85">
    <circle cx="100" cy="360" r="5"/><circle cx="130" cy="340" r="5"/><circle cx="160" cy="370" r="5"/>
    <circle cx="200" cy="320" r="5"/><circle cx="230" cy="300" r="5"/><circle cx="260" cy="330" r="5"/>
  </g>
  <g fill="#a78bfa" opacity="0.85">
    <circle cx="330" cy="220" r="5"/><circle cx="360" cy="190" r="5"/><circle cx="390" cy="240" r="5"/>
    <circle cx="420" cy="180" r="5"/><circle cx="440" cy="200" r="5"/><circle cx="400" cy="160" r="5"/>
  </g>
  <text x="60" y="408" fill="#5b6678" font-family="monospace" font-size="12">YOUNGER</text>
  <text x="400" y="408" fill="#5b6678" font-family="monospace" font-size="12">OLDER</text>

  <!-- Risk breakdown bars -->
  <rect x="498" y="120" width="270" height="300" rx="8" fill="#111827" stroke="#232c40"/>
  <text x="518" y="150" fill="#8b97ad" font-family="monospace" font-size="14">RISK LEVEL SHARE</text>
  <g fill="#22d3ee">
    <rect x="518" y="180" width="220" height="22" rx="3" opacity="0.35"/>
    <rect x="518" y="180" width="140" height="22" rx="3"/>
  </g>
  <text x="518" y="218" fill="#8b97ad" font-family="monospace" font-size="12">LOW RISK</text>

  <g fill="#a78bfa">
    <rect x="518" y="250" width="220" height="22" rx="3" opacity="0.35"/>
    <rect x="518" y="250" width="90" height="22" rx="3"/>
  </g>
  <text x="518" y="288" fill="#8b97ad" font-family="monospace" font-size="12">MODERATE RISK</text>

  <g fill="#e6e9f0">
    <rect x="518" y="320" width="220" height="22" rx="3" opacity="0.2"/>
    <rect x="518" y="320" width="40" height="22" rx="3" fill="#ef4444" opacity="0.7"/>
  </g>
  <text x="518" y="358" fill="#8b97ad" font-family="monospace" font-size="12">HIGH RISK</text>
</svg>
